    // 週期性保養資料已移至 app.js 共用層 FM.hvacMaintenance（逾期會自動推進中控/派工/LINE）

    // ────────────────────────────────────────────────────────────────────
    // 1b. 控制狀態（可即時操作、跨重繪保留）
    // ────────────────────────────────────────────────────────────────────

    const AC_MODES = [['cool', '❄️制冷'], ['dry', '💧除濕'], ['fan', '🌀送風'], ['auto', '🔄自動']];
    const AC_FANS = [['low', '弱'], ['mid', '中'], ['high', '強'], ['auto', '自動']];
    const DH_MODES = [['cont', '連續'], ['auto', '自動'], ['intv', '間歇']];

    const controlState = {
      ac: hvacData.vrvAreas.map(z => ({
        code: z.code, name: z.name, power: true,
        mode: z.status === 'crit' ? 'cool' : 'auto',
        setTemp: z.setTemp, fan: z.status === 'crit' ? 'high' : 'auto'
      })),
      dh: hvacData.dehumidifiers.map(d => ({
        code: d.code, name: d.name, power: true,
        targetRH: d.targetRH, currentRH: d.currentRH, mode: d.mode, drain: d.drain, capacity: d.capacity
      }))
    };

    // ────────────────────────────────────────────────────────────────────
    // 2. Tab 互動狀態
    // ────────────────────────────────────────────────────────────────────

    let activeTab = 'overview';

    function switchTab(tabName, element) {
      activeTab = tabName;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      if (element) element.classList.add('active');
      renderContent();
    }

    // ────────────────────────────────────────────────────────────────────
    // 3. UI 渲染函數
    // ────────────────────────────────────────────────────────────────────

    function renderContent() {
      let html = '';

      // Tab 按鈕
      html += `
        <div class="tab-container">
          <button class="tab-btn ${activeTab === 'overview' ? 'active' : ''}" onclick="switchTab('overview', this)">
            概覽
          </button>
          <button class="tab-btn ${activeTab === 'zones' ? 'active' : ''}" onclick="switchTab('zones', this)">
            各區溫濕度
          </button>
          <button class="tab-btn ${activeTab === 'control' ? 'active' : ''}" onclick="switchTab('control', this)">
            設備控制
          </button>
          <button class="tab-btn ${activeTab === 'maintenance' ? 'active' : ''}" onclick="switchTab('maintenance', this)">
            保養紀錄
          </button>
          <button class="tab-btn ${activeTab === 'anomalies' ? 'active' : ''}" onclick="switchTab('anomalies', this)">
            異常警告
          </button>
          <button class="tab-btn ${activeTab === 'schedule' ? 'active' : ''}" onclick="switchTab('schedule', this)">
            自動排程建議
          </button>
        </div>
      `;

      // 根據 activeTab 切換內容
      if (activeTab === 'overview') {
        html += renderOverview();
      } else if (activeTab === 'zones') {
        html += renderZones();
      } else if (activeTab === 'control') {
        html += renderControl();
      } else if (activeTab === 'maintenance') {
        html += renderMaintenance();
      } else if (activeTab === 'anomalies') {
        html += renderAnomalies();
      } else if (activeTab === 'schedule') {
        html += renderSchedule();
      }

      FM.loadContent(html);

      // 重新設置 Tab 按鈕樣式
      setTimeout(() => {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          if (btn.classList.contains('active')) {
            btn.style.color = '#0054A7';
            btn.style.borderBottomColor = '#0054A7';
          }
        });
      }, 0);
    }

    // ────────────────────────────────────────────────────────────────────
    // 3.1 概覽頁面
    // ────────────────────────────────────────────────────────────────────

    function renderOverview() {
      const { energySavings, tempTrend, chillers, airflows } = hvacData;
      const stats = FM.getAlertStats();
      const hvacAlerts = FM.getAlertsForSystem('HVAC');

      let html = `
        <div class="grid grid-cols-2 gap-3" style="margin-bottom: 24px;">
          <!-- 節能率 Gauge -->
          <div class="card">
            <div class="card-header">
              <h3 class="text-md font-semibold">本月節能率</h3>
            </div>
            <div class="card-body" style="text-align: center; padding: 24px;">
              ${FM.gauge(energySavings.currentSaving)}
              <div style="margin-top: 12px; font-size: 12px; color: #666;">
                目標: ${energySavings.targetMin}%-${energySavings.targetMax}% | 實現: <span style="color: #00A94F; font-weight: bold;">${energySavings.currentSaving}%</span>
              </div>
              <div style="margin-top: 8px; padding: 8px; background: #f5f5f5; border-radius: 4px; font-size: 12px;">
                省電 <span style="font-weight: bold;">${FM.fmtNum(energySavings.savingsAmount)}</span> kWh | 省費 <span style="font-weight: bold;">$${FM.fmtNum(energySavings.costSavings)}</span>
              </div>
            </div>
          </div>

          <!-- 冰水主機狀態 -->
          <div class="card">
            <div class="card-header">
              <h3 class="text-md font-semibold">冰水主機</h3>
            </div>
            <div class="card-body">
              ${chillers.map(ch => `
                <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #e0e0e0;">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                    <span class="font-semibold text-sm">${ch.name}</span>
                    <span class="badge ${ch.status === 'ok' ? 'ok' : 'warn'}" style="font-size: 11px;">
                      ${ch.status === 'ok' ? '正常' : '警告'}
                    </span>
                  </div>
                  <div style="font-size: 12px; color: #666; line-height: 1.6;">
                    進水: ${ch.inletTemp}°C | 出水: ${ch.outletTemp}°C | 流量: ${ch.flowRate}% | 功率: ${ch.power} kW
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <!-- 溫度趨勢圖 -->
        <div class="card" style="margin-bottom: 24px;">
          <div class="card-header">
            <h3 class="text-md font-semibold">過去 24 小時溫度趨勢（關鍵區域）</h3>
          </div>
          <div class="card-body" style="padding: 20px;">
            <div style="background: #f9f9f9; padding: 16px; border-radius: 8px; overflow-x: auto;">
              ${FM.svgLine(tempTrend.areas.map(area => ({
                name: area.name,
                data: area.values
              })))}
            </div>
            <div style="display: flex; gap: 16px; margin-top: 12px; font-size: 12px;">
              ${tempTrend.areas.map((area, idx) => `
                <div style="display: flex; align-items: center; gap: 6px;">
                  <div style="width: 8px; height: 8px; background: ${['#FF6B35', '#004E89', '#1B998B'][idx]}; border-radius: 2px;"></div>
                  <span>${area.name}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <!-- 風量管理 -->
        <div class="card" style="margin-bottom: 24px;">
          <div class="card-header">
            <h3 class="text-md font-semibold">各區風量檢查</h3>
          </div>
          <div class="card-body">
            <table class="dtable">
              <thead>
                <tr>
                  <th>區域</th>
                  <th>供應風量</th>
                  <th>回風量</th>
                  <th>目標</th>
                  <th>狀態</th>
                </tr>
              </thead>
              <tbody>
                ${airflows.map(af => {
                  const devSupply = af.supplyAir - af.target;
                  const status = Math.abs(devSupply) <= 20 ? 'ok' : devSupply < 0 ? 'warn' : 'warn';
                  return `
                    <tr>
                      <td>${FM.spaceTag(af.areaCode.split('-').slice(0, 2).join('-') + '-HVAC-01')}</td>
                      <td>${af.supplyAir} m³/h</td>
                      <td>${af.returnAir} m³/h</td>
                      <td>${af.target} m³/h</td>
                      <td><span class="badge ${status}">${status === 'ok' ? '正常' : '偏低'}</span></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- HVAC 告警摘要 -->
        <div class="card">
          <div class="card-header">
            <h3 class="text-md font-semibold">告警摘要</h3>
          </div>
          <div class="card-body">
            ${hvacAlerts.length > 0 ? `
              <div style="display: flex; flex-direction: column; gap: 8px;">
                ${hvacAlerts.slice(0, 3).map(alert => `
                  <div style="padding: 8px; background: ${alert.level === 'crit' ? '#ffebee' : '#fff3e0'}; border-left: 3px solid ${alert.level === 'crit' ? '#C0392B' : '#D35400'}; border-radius: 4px;">
                    <div style="font-weight: 500; font-size: 12px; color: #222;">${alert.msg}</div>
                    <div style="font-size: 11px; color: #666; margin-top: 4px;">
                      ${FM.timeAgo(alert.time)} | ${alert.aiAction}
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div style="text-align: center; color: #999; padding: 20px;">目前無 HVAC 系統告警</div>
            `}
          </div>
        </div>
      `;

      return html;
    }

    // ────────────────────────────────────────────────────────────────────
    // 3.2 各區溫濕度頁面
    // ────────────────────────────────────────────────────────────────────

    function renderZones() {
      const { vrvAreas } = hvacData;

      let html = `
        <div class="grid grid-cols-2 gap-3">
          ${vrvAreas.map(zone => {
            const statusBadgeClass = zone.status === 'ok' ? 'ok' : zone.status === 'warn' ? 'warn' : 'crit';
            const tempDiff = zone.currentTemp - zone.setTemp;
            const humidDiff = zone.currentHumidity - zone.setHumidity;

            return `
              <div class="card">
                <div class="card-header">
                  <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                      <div class="text-sm font-semibold">${FM.spaceTag(zone.code)}</div>
                      <div class="text-xs text-muted">${zone.name}</div>
                    </div>
                    <span class="badge ${statusBadgeClass}" style="font-size: 11px;">
                      ${zone.status === 'ok' ? '正常' : zone.status === 'warn' ? '偏差' : '異常'}
                    </span>
                  </div>
                </div>
                <div class="card-body">
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <!-- 溫度 -->
                    <div style="background: #f0f7ff; padding: 12px; border-radius: 6px; border-left: 3px solid #008CD6;">
                      <div class="text-xs text-muted" style="margin-bottom: 4px;">室溫</div>
                      <div style="font-size: 18px; font-weight: bold; color: #0054A7;">${zone.currentTemp}°C</div>
                      <div class="text-xs text-muted" style="margin-top: 4px;">
                        設定: ${zone.setTemp}°C
                        <span style="color: ${tempDiff > 0.5 ? '#D35400' : tempDiff < -0.5 ? '#2E86AB' : '#1A7A4A'};">
                          ${tempDiff > 0 ? '+' : ''}${tempDiff.toFixed(1)}°C
                        </span>
                      </div>
                    </div>

                    <!-- 濕度 -->
                    <div style="background: #f0fff4; padding: 12px; border-radius: 6px; border-left: 3px solid #00A94F;">
                      <div class="text-xs text-muted" style="margin-bottom: 4px;">濕度</div>
                      <div style="font-size: 18px; font-weight: bold; color: #1A7A4A;">${zone.currentHumidity}%</div>
                      <div class="text-xs text-muted" style="margin-top: 4px;">
                        設定: ${zone.setHumidity}%
                        <span style="color: ${humidDiff > 3 ? '#D35400' : humidDiff < -3 ? '#2E86AB' : '#1A7A4A'};">
                          ${humidDiff > 0 ? '+' : ''}${humidDiff}%
                        </span>
                      </div>
                    </div>
                  </div>

                  <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666;">
                      <span>耗電: ${zone.power} kW</span>
                      <span>效率: <span style="color: #1A7A4A; font-weight: bold;">${zone.efficiency}%</span></span>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;

      return html;
    }

    // ────────────────────────────────────────────────────────────────────
    // 3.3 異常警告頁面
    // ────────────────────────────────────────────────────────────────────

    function renderAnomalies() {
      const { anomalies } = hvacData;

      let html = `
        <div style="display: flex; flex-direction: column; gap: 16px;">
          ${anomalies.map(anom => {
            const iconMap = {
              'overcool': '❄️',
              'overheat': '🔥',
              'idle': '⏸️'
            };
            const severityColor = {
              'crit': '#C0392B',
              'warn': '#D35400',
              'info': '#008CD6'
            };

            return `
              <div class="card" style="border-left: 4px solid ${severityColor[anom.severity]};">
                <div class="card-header">
                  <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 24px;">${iconMap[anom.type]}</span>
                    <div>
                      <div class="font-semibold">${FM.spaceTag(anom.code)} — ${anom.name}</div>
                      <div class="text-xs text-muted">${anom.msg}</div>
                    </div>
                    <span class="badge ${anom.severity}" style="margin-left: auto;">
                      ${anom.severity === 'crit' ? '緊急' : anom.severity === 'warn' ? '警告' : '資訊'}
                    </span>
                  </div>
                </div>
                <div class="card-body">
                  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <div>

          </div>
          <div class="card-body">

              const logs = FM.loadAudit().slice(0, 8);

              return `<table class="dtable"><thead><tr><th>時間</th><th>動作</th><th>對象</th><th>內容</th></tr></thead><tbody>
                ${logs.map(l => `<tr>
                  <td class="text-sm">${new Date(l.t).toLocaleString('zh-TW', { hour12: false })}</td>

                  <td class="text-sm text-muted">${l.detail}</td>

      `;
      return html;
    }

    // ────────────────────────────────────────────────────────────────────
    // 3.6 週期性保養紀錄頁面
    // ────────────────────────────────────────────────────────────────────

    // 保養狀態判斷沿用共用層 FM.maintInfo（資料：FM.hvacMaintenance）

    function fmtDateOffset(days) {
      return new Date(Date.now() + days * 86400000).toLocaleDateString('zh-TW');
    }

    function renderMaintenance() {
      const items = FM.hvacMaintenance.map((m, i) => Object.assign({ _i: i }, m, FM.maintInfo(m)));
      const overdue = items.filter(x => x.level === 'overdue').length;
      const due = items.filter(x => x.level === 'due').length;
      const ok = items.filter(x => x.level === 'ok').length;
      const order = { overdue: 0, due: 1, ok: 2 };
      const sorted = items.slice().sort((a, b) => order[a.level] - order[b.level] || a.remain - b.remain);
      const cfg = {
        overdue: { c: '#C0392B', bg: '#ffebee', badge: 'crit', t: '已逾期' },
        due: { c: '#D35400', bg: '#fff3e0', badge: 'warn', t: '即將到期' },
        ok: { c: '#1A7A4A', bg: '', badge: 'ok', t: '正常' }
      };

      let html = `
        <div class="grid grid-cols-3 gap-3" style="margin-bottom:20px;">
          <div class="card"><div class="card-body" style="text-align:center; padding:18px;">
            <div style="font-size:28px; font-weight:bold; color:#C0392B;">${overdue}</div>
            <div class="text-xs text-muted">已逾期</div></div></div>
          <div class="card"><div class="card-body" style="text-align:center; padding:18px;">
            <div style="font-size:28px; font-weight:bold; color:#D35400;">${due}</div>
            <div class="text-xs text-muted">14 天內到期</div></div></div>
          <div class="card"><div class="card-body" style="text-align:center; padding:18px;">
            <div style="font-size:28px; font-weight:bold; color:#1A7A4A;">${ok}</div>
            <div class="text-xs text-muted">正常</div></div></div>
        </div>

        ${(overdue + due) > 0 ? `
          <div style="background:#fff3e0; border-left:4px solid #D35400; padding:12px 16px; border-radius:6px; margin-bottom:16px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
              <div><strong style="color:#D35400;">⚠ 保養警示</strong>　目前有 <b>${overdue}</b> 項逾期、<b>${due}</b> 項即將到期。</div>
              <button onclick="pushMaintLine()" class="btn btn-small" style="background:#06C755; color:#fff; border:none;">💬 推播 LINE（工務＋主管群）</button>
            </div>
            <div class="text-xs" style="color:#8a5a1e; margin-top:8px;">逾期/即將到期已自動進入 <b>中控戰情即時告警</b> 與 <b>派工待指派工單</b>；LINE 每日自動推播一次（可手動補推）。</div>
          </div>
        ` : `
          <div style="background:#f0fff4; border-left:4px solid #00A94F; padding:12px 16px; border-radius:6px; margin-bottom:16px;">
            <strong style="color:#1A7A4A;">✓ 全部保養項目在週期內</strong>
          </div>
        `}

        <div class="card">
          <div class="card-header">
            <h3 class="text-md font-semibold">週期性保養紀錄</h3>
            <div class="text-xs text-muted" style="margin-top:4px;">逾期與即將到期項目優先排序</div>
          </div>
          <div class="card-body">
            <table class="dtable">
              <thead>
                <tr>
                  <th>保養項目</th><th>範圍</th><th>週期</th><th>上次保養</th><th>下次到期</th><th>狀態</th><th>負責</th><th>操作</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.map(x => {
                  const k = cfg[x.level];
                  const remainTxt = x.level === 'overdue' ? `逾期 ${Math.abs(x.remain)} 天` : `剩 ${x.remain} 天`;
                  return `
                    <tr style="background:${k.bg};">
                      <td><div class="font-semibold text-sm">${x.item}</div><div class="text-xs text-muted">${x.note}</div></td>
                      <td class="text-sm">${x.scope}</td>
                      <td class="text-sm">${x.cycleDays} 天</td>
                      <td class="text-sm">${fmtDateOffset(-x.daysSinceLast)}</td>
                      <td class="text-sm" style="color:${k.c}; font-weight:600;">${fmtDateOffset(x.remain)}</td>
                      <td><span class="badge ${k.badge}">${k.t}</span><div class="text-xs" style="color:${k.c}; margin-top:2px;">${remainTxt}</div></td>
                      <td class="text-sm">${x.owner}</td>
                      <td><button onclick="completeMaintenance(${x._i})" class="btn btn-primary btn-small">登記完成</button></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
      return html;
    }

    // ────────────────────────────────────────────────────────────────────
    // 4. 互動函數
    // ────────────────────────────────────────────────────────────────────

    const labelOf = (arr, k) => (arr.find(x => x[0] === k) || [, k])[1];

    // 空調控制（每個動作寫入操作軌跡 FM.logAction）
    function findAC(code) { return controlState.ac.find(a => a.code === code); }
    function toggleAC(code) { const a = findAC(code); if (a) { a.power = !a.power; FM.logAction(a.power ? '空調開機' : '空調關機', a.name + '（' + code + '）', ''); } renderContent(); }
    function setACMode(code, mode) { const a = findAC(code); if (a) { a.mode = mode; a.power = true; FM.logAction('空調設模式', a.name, labelOf(AC_MODES, mode)); } renderContent(); }
    function adjustACTemp(code, delta) { const a = findAC(code); if (a) { a.setTemp = Math.min(30, Math.max(18, Math.round((a.setTemp + delta) * 10) / 10)); FM.logAction('空調設定溫度', a.name, a.setTemp + '°C'); } renderContent(); }
    function setACFan(code, fan) { const a = findAC(code); if (a) { a.fan = fan; FM.logAction('空調設風量', a.name, labelOf(AC_FANS, fan)); } renderContent(); }

    // 除濕機控制（吊隱式）
    function findDH(code) { return controlState.dh.find(d => d.code === code); }
    function toggleDH(code) { const d = findDH(code); if (d) { d.power = !d.power; FM.logAction(d.power ? '除濕機開機' : '除濕機關機', d.name, ''); } renderContent(); }
    function adjustDHTarget(code, delta) { const d = findDH(code); if (d) { d.targetRH = Math.min(70, Math.max(40, d.targetRH + delta)); FM.logAction('除濕機設定濕度', d.name, d.targetRH + '%'); } renderContent(); }
    function setDHMode(code, mode) { const d = findDH(code); if (d) { d.mode = mode; FM.logAction('除濕機設模式', d.name, labelOf(DH_MODES, mode)); } renderContent(); }

    // 逾期保養 → 手動補推 LINE
    function pushMaintLine() { FM.pushMaintenanceLine(); }

    // 保養登記完成確認函數
    function confirmCompleteMaintenance(idx) {
      FM.hvacMaintenance[idx].daysSinceLast = 0;
      FM.syncMaintenanceAlerts();
      const item = FM.hvacMaintenance[idx].item;
      const cycleDays = FM.hvacMaintenance[idx].cycleDays;
      FM.logAction('保養完成', item, '重置週期 ' + cycleDays + ' 天');
      FM.closeModal();
      renderContent();
    }

    // 保養登記完成（重置週期 → 重新同步中控/派工告警 + 寫入軌跡）
    function completeMaintenance(idx) {
      const m = FM.hvacMaintenance[idx];
      if (!m) return;
      FM.showModal('登記保養完成', '確認「' + m.item + '」已完成本次保養？將重置週期為 ' + m.cycleDays + ' 天，並自中控/派工移除該告警。', [
        { label: '確認完成', onclick: 'confirmCompleteMaintenance(' + idx + ')', type: 'primary' },
        { label: '取消', onclick: 'FM.closeModal()', type: 'secondary' }
      ]);
    }

    function confirmAnomaly(code) {
      FM.showModal('確認處理', '已確認異常 ' + code + ' 已處理？', [
        {
          label: '確認',
          onclick: 'FM.closeModal(); alert("已記錄處理時間: " + new Date().toLocaleTimeString("zh-TW"));',
          type: 'primary'
        },
        {
          label: '取消',
          onclick: 'FM.closeModal()',
          type: 'secondary'
        }
      ]);
    }

    // ────────────────────────────────────────────────────────────────────

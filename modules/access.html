  <script>

    // ========================================================================

    // 初始化頁面
    FM.renderShell('access', '門禁安防/清潔 — 德新行政管理平台');

    // 門禁與清潔專用 mock 資料

      cleaningSchedules: [
        {

        },
        {

        },
        {

          lastClean: new Date(Date.now() - 25 * 60000),
          status: 'completed',
          assignee: '林清潔',
          priority: 'normal'
        }
      ],

      // 清潔回報記錄（LINE Bot 風格）
      cleaningReports: [
        {
          id: 'CLN-RPT-001',
          code: '7-E1-CLN-01',
          assignee: '李清潔',
          time: new Date(Date.now() - 30 * 60000),

        },
        {

        },
        {

          photo: '⚠️'
        },
        {
          id: 'CLN-RPT-004',
          code: '7-D1-CLN-01',
          assignee: '陳清潔',
          time: new Date(Date.now() - 15 * 60000),
          status: 'in_progress',
          message: '🔄 辦公室清潔進行中，預計 5 分鐘完成',
          photo: '🔄'
        }
      ],

      // 非營業時段告警
      afterHoursAlerts: [
        {
          id: 'AH-001',
          code: '7-C1-ACC-01',
          time: new Date(Date.now() - 8 * 3600000),
          msg: '非營業時段 (22:34) 運動訓練區門禁開啟',
          duration: '2 分鐘',
          status: 'resolved'
        },
        {
          id: 'AH-002',
          code: '7-A2-ACC-01',
          time: new Date(Date.now() - 3 * 60000),
          msg: '非營業時段 (23:58) 醫師診間門禁未關',
          duration: '進行中',
          status: 'active'
        }
      ]
    };

    // 建構頁面 HTML
    let pageHtml = `
      <div class="container" style="padding: var(--space-lg); max-width: 1400px; margin: 0 auto;">

        <!-- 頁面標題與統計 -->
        <div class="section-title" style="margin-bottom: var(--space-xl);">
          🔐 門禁安防 / 🧹 環境清潔
        </div>

        <!-- 統計卡片行 -->
        <div class="grid grid-cols-4" style="gap: var(--space-lg); margin-bottom: var(--space-xl);">
          <div class="kpi" style="border-left: 4px solid var(--color-primary-light);">
            <div class="kpi-label">門禁點位</div>
            <div class="kpi-value">${AccessCleanData.accessPoints.length}</div>
            <div class="kpi-unit">個</div>
          </div>
          <div class="kpi success" style="border-left: 4px solid var(--color-success);">
            <div class="kpi-label">已上鎖</div>
            <div class="kpi-value">${AccessCleanData.accessPoints.filter(p => p.status === 'locked').length}</div>
            <div class="kpi-unit">點</div>
          </div>
          <div class="kpi warning" style="border-left: 4px solid var(--color-warning);">
            <div class="kpi-label">清潔排程</div>
            <div class="kpi-value">${AccessCleanData.cleaningSchedules.length}</div>
            <div class="kpi-unit">件</div>
          </div>
          <div class="kpi danger" style="border-left: 4px solid var(--color-danger);">
            <div class="kpi-label">逾期未清</div>
            <div class="kpi-value">${AccessCleanData.cleaningSchedules.filter(s => s.status === 'overdue').length}</div>
            <div class="kpi-unit">件</div>
          </div>
        </div>

        <!-- 頁籤容器 -->
        <div style="margin-bottom: var(--space-lg);">
          <div style="display: flex; gap: var(--space-md); border-bottom: 2px solid var(--color-light); padding-bottom: var(--space-md);">
            <button class="tab-btn" data-tab="access-status" style="padding: var(--space-md) var(--space-lg); background: var(--color-primary-light); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600;">
              🔐 門禁狀態
            </button>
            <button class="tab-btn" data-tab="cleaning-schedule" style="padding: var(--space-md) var(--space-lg); background: transparent; color: var(--color-dark); border: none; cursor: pointer; font-weight: 600;">
              📋 清潔排程
            </button>
            <button class="tab-btn" data-tab="cleaning-reports" style="padding: var(--space-md) var(--space-lg); background: transparent; color: var(--color-dark); border: none; cursor: pointer; font-weight: 600;">
              📝 清潔回報
            </button>
            <button class="tab-btn" data-tab="after-hours" style="padding: var(--space-md) var(--space-lg); background: transparent; color: var(--color-dark); border: none; cursor: pointer; font-weight: 600;">
              🌙 非營業時段
            </button>
          </div>
        </div>

        <!-- 頁籤內容 -->
        <div id="tab-access-status" class="tab-content">
          ${renderAccessStatus()}
        </div>
        <div id="tab-cleaning-schedule" class="tab-content" style="display: none;">
          ${renderCleaningSchedule()}
        </div>
        <div id="tab-cleaning-reports" class="tab-content" style="display: none;">
          ${renderCleaningReports()}
        </div>
        <div id="tab-after-hours" class="tab-content" style="display: none;">
          ${renderAfterHours()}
        </div>

      </div>
    `;

    // 門禁狀態渲染
    function renderAccessStatus() {
      let html = `
        <div style="display: flex; gap: var(--space-lg); margin-bottom: var(--space-xl);">
          <div style="flex: 1;">
            <h3 style="font-size: var(--font-size-md); font-weight: 600; margin-bottom: var(--space-lg);">各出入口即時狀態</h3>
            <div class="grid grid-cols-3" style="gap: var(--space-lg);">
      `;

      AccessCleanData.accessPoints.forEach(point => {
        const statusColor = point.status === 'locked' ? 'var(--color-success)' : 'var(--color-warning)';
        const statusLabel = point.status === 'locked' ? '已鎖定' : '未鎖定';
        const statusIcon = point.status === 'locked' ? '🔒' : '🔓';

        html += `
          <div class="card" style="background: var(--color-light); padding: var(--space-lg);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md);">
              <div style="font-weight: 600; font-size: var(--font-size-md);">${point.name}</div>
              <span class="badge" style="background-color: ${statusColor}; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">
                ${statusIcon} ${statusLabel}
              </span>
            </div>
            <div style="color: var(--color-medium); font-size: var(--font-size-sm); margin-bottom: 8px;">
              ${FM.spaceTag(point.code)}
            </div>
            <div style="display: flex; justify-content: space-between; padding-top: var(--space-md); border-top: 1px solid rgba(0,0,0,0.05);">
              <div>
                <div style="color: var(--color-medium); font-size: var(--font-size-sm);">開啟次數</div>
                <div style="font-size: var(--font-size-lg); font-weight: 600; color: var(--color-primary-dark);">${point.unlockCount}</div>
              </div>
              <div>
                <div style="color: var(--color-medium); font-size: var(--font-size-sm);">最後動作</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-dark);">${FM.timeAgo(point.lastActivity)}</div>
              </div>
            </div>
          </div>
        `;
      });

      html += `
            </div>
          </div>
        </div>

        <div style="flex: 0.4;">
          <h3 style="font-size: var(--font-size-md); font-weight: 600; margin-bottom: var(--space-lg);">門禁告警匯總</h3>
          <div class="card">
            ${renderAccessAlerts()}
          </div>
        </div>
      `;

      return html;
    }

    // 門禁告警
    function renderAccessAlerts() {
      const accAlerts = FM.getAlertsForSystem('ACC');
      if (accAlerts.length === 0) {
        return '<div style="padding: var(--space-lg); text-align: center; color: var(--color-medium);">無告警</div>';
      }

      let html = '<div style="max-height: 400px; overflow-y: auto;">';
      accAlerts.forEach(alert => {
        const levelColor = alert.level === 'crit' ? 'var(--color-danger)' : alert.level === 'warn' ? 'var(--color-warning)' : 'var(--color-info)';
        const levelLabel = alert.level === 'crit' ? '緊急' : alert.level === 'warn' ? '一般' : '資訊';

        html += `
          <div class="alert-row" style="padding: var(--space-md); border-left: 4px solid ${levelColor}; margin-bottom: var(--space-md); background: rgba(0,0,0,0.02);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
              <span style="font-weight: 600; color: ${levelColor};">● ${levelLabel}</span>
              <span style="font-size: var(--font-size-sm); color: var(--color-medium);">${FM.timeAgo(alert.time)}</span>
            </div>
            <div style="font-size: var(--font-size-sm); color: var(--color-dark); margin-bottom: 6px;">${alert.msg}</div>
            <div style="font-size: var(--font-size-sm); color: var(--color-medium); margin-bottom: 8px;">📌 ${FM.spaceTag(alert.space)}</div>
            ${alert.needConfirm && !alert.confirmed ? `
              <button class="btn btn-small btn-primary" onclick="FM.confirmAlert('${alert.id}')" style="width: 100%; padding: 6px; margin-top: 6px;">確認已處理</button>
            ` : `
              <span style="font-size: var(--font-size-sm); color: var(--color-success);">✓ 已確認</span>
            `}
          </div>
        `;
      });
      html += '</div>';
      return html;
    }

    // 清潔排程渲染
    // TODO: 技術債 - 當記錄 > 50 筆時，應實裝分頁或虛擬化(virtualization)
    //       目前 mock 資料 6 筆，生產環境需採用 DataTable 或客製分頁機制
    function renderCleaningSchedule() {
      const filteredSchedules = AccessCleanData.cleaningSchedules;
      const statusColors = {
        'completed': 'var(--color-success)',
        'in_progress': 'var(--color-primary-light)',
        'pending': 'var(--color-info)',
        'overdue': 'var(--color-danger)'
      };
      const statusLabels = {
        'completed': '✓ 已完成',
        'in_progress': '🔄 進行中',
        'pending': '⏳ 待清潔',
        'overdue': '❌ 逾期'
      };

      let html = `
        <div class="card">
          <div class="card-header" style="padding: var(--space-lg); border-bottom: 1px solid var(--color-light); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-size: var(--font-size-md); font-weight: 600; margin: 0;">清潔排程總表</h3>
            <select id="clean-filter" style="padding: 6px 12px; border: 1px solid var(--color-light); border-radius: var(--radius-sm); font-size: var(--font-size-sm);">
              <option value="">全部狀態</option>
              <option value="completed">已完成</option>
              <option value="in_progress">進行中</option>
              <option value="pending">待清潔</option>
              <option value="overdue">逾期</option>
            </select>
          </div>
          <div class="card-body" style="padding: 0;">
            <table class="dtable" style="width: 100%;">
              <thead style="background: var(--color-light);">
                <tr>
                  <th style="padding: var(--space-md); text-align: left; font-weight: 600;">空間</th>
                  <th style="padding: var(--space-md); text-align: left; font-weight: 600;">清潔排程</th>
                  <th style="padding: var(--space-md); text-align: center; font-weight: 600;">狀態</th>
                  <th style="padding: var(--space-md); text-align: left; font-weight: 600;">負責人</th>
                  <th style="padding: var(--space-md); text-align: left; font-weight: 600;">最後清潔</th>
                  <th style="padding: var(--space-md); text-align: center; font-weight: 600;">動作</th>
                </tr>
              </thead>
              <tbody>
      `;

      filteredSchedules.forEach(schedule => {
        html += `
          <tr class="alert-row" data-status="${schedule.status}">
            <td style="padding: var(--space-md);">
              <div style="font-weight: 600;">${schedule.name}</div>
              <div style="font-size: var(--font-size-sm); color: var(--color-medium);">${FM.spaceTag(schedule.code)}</div>
            </td>
            <td style="padding: var(--space-md); font-size: var(--font-size-sm);">${schedule.schedule}</td>
            <td style="padding: var(--space-md); text-align: center;">
              <span class="badge" style="background-color: ${statusColors[schedule.status]}; color: white; padding: 4px 8px; border-radius: 4px;">
                ${statusLabels[schedule.status]}
              </span>
            </td>
            <td style="padding: var(--space-md); font-size: var(--font-size-sm);">${schedule.assignee}</td>
            <td style="padding: var(--space-md); font-size: var(--font-size-sm); color: var(--color-medium);">${FM.timeAgo(schedule.lastClean)}</td>
            <td style="padding: var(--space-md); text-align: center;">
              <button class="btn btn-small btn-primary" onclick="alert('已派工予 ${schedule.assignee}')" style="padding: 4px 8px; font-size: 12px;">派工</button>
            </td>
          </tr>
        `;
      });

      html += `
              </tbody>
            </table>
          </div>
        </div>
      `;

      return html;
    }

    // 清潔回報渲染（LINE Bot 風格）
    function renderCleaningReports() {
      let html = `
        <div class="card">
          <div class="card-header" style="padding: var(--space-lg); border-bottom: 1px solid var(--color-light);">
            <h3 style="font-size: var(--font-size-md); font-weight: 600; margin: 0;">清潔回報記錄 (LINE Bot 風格)</h3>
          </div>
          <div class="card-body" style="padding: var(--space-lg); max-height: 500px; overflow-y: auto; background: #f9f9f9;">
      `;

      AccessCleanData.cleaningReports.forEach(report => {
        const isCritical = report.status === 'issue';
        const bgColor = isCritical ? 'rgba(192, 57, 43, 0.05)' : 'white';
        const borderColor = isCritical ? 'var(--color-danger)' : 'var(--color-light)';

        html += `
          <div style="background: ${bgColor}; border: 1px solid ${borderColor}; border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-lg); display: flex; gap: var(--space-md);">
            <div style="font-size: 32px; flex-shrink: 0;">${report.photo}</div>
            <div style="flex: 1;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                <div style="font-weight: 600; color: var(--color-dark);">${report.assignee}</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-medium);">${FM.timeAgo(report.time)}</div>
              </div>
              <div style="font-size: var(--font-size-sm); color: var(--color-dark); margin-bottom: 8px; line-height: var(--line-height-relaxed);">${report.message}</div>
              <div style="display: flex; gap: var(--space-md); align-items: center;">
                <span style="font-size: var(--font-size-sm); color: var(--color-medium);">📍 ${FM.spaceTag(report.code)}</span>
                <button class="btn btn-small btn-secondary" onclick="alert('查看詳細: ' + '${report.id}')" style="padding: 4px 8px; font-size: 12px;">詳細</button>
              </div>
            </div>
          </div>
        `;
      });

      html += `
          </div>
        </div>
      `;

      return html;
    }

    // 非營業時段告警
    function renderAfterHours() {
      let html = `
        <div class="grid grid-cols-1" style="gap: var(--space-lg);">
      `;

      AccessCleanData.afterHoursAlerts.forEach(alert => {
        const statusColor = alert.status === 'active' ? 'var(--color-danger)' : 'var(--color-success)';
        const statusLabel = alert.status === 'active' ? '🔴 進行中' : '✓ 已解決';

        html += `
          <div class="card" style="border-left: 4px solid ${statusColor}; padding: var(--space-lg);">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-md);">
              <div>
                <div style="font-weight: 600; font-size: var(--font-size-md); margin-bottom: var(--space-sm);">${alert.msg}</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-medium); margin-bottom: 6px;">⏰ ${FM.timeAgo(alert.time)}</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-medium);">📍 ${FM.spaceTag(alert.code)}</div>
              </div>
              <div style="text-align: right;">
                <div style="color: ${statusColor}; font-weight: 600; margin-bottom: 8px;">${statusLabel}</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-medium);">持續時間: ${alert.duration}</div>
              </div>
            </div>
            ${alert.status === 'active' ? `
              <button class="btn btn-primary" onclick="FM.confirmAlert('${alert.id}'); this.parentElement.style.display='none';" style="width: 100%; padding: 8px; margin-top: var(--space-md);">確認已處理</button>
            ` : ''}
          </div>
        `;
      });

      html += `
        </div>
      `;

      return html;
    }

    // 載入內容
    FM.loadContent(pageHtml);

    // 頁籤切換事件
    document.addEventListener('DOMContentLoaded', function() {
      const tabButtons = document.querySelectorAll('.tab-btn');
      const tabContents = document.querySelectorAll('.tab-content');

      tabButtons.forEach(button => {
        button.addEventListener('click', function() {
          const tabName = this.dataset.tab;

          // 隱藏所有頁籤
          tabContents.forEach(content => {
            content.style.display = 'none';
          });

          // 顯示選中頁籤
          document.getElementById(tabName).style.display = 'block';

          // 更新按鈕樣式
          tabButtons.forEach(btn => {
            btn.style.background = 'transparent';
            btn.style.color = 'var(--color-dark)';
          });
          this.style.background = 'var(--color-primary-light)';
          this.style.color = 'white';
        });
      });

      // 清潔排程篩選
      const cleanFilter = document.getElementById('clean-filter');
      if (cleanFilter) {
        cleanFilter.addEventListener('change', function() {
          const filterValue = this.value;
          const rows = document.querySelectorAll('.dtable tbody tr');

          rows.forEach(row => {
            if (filterValue === '') {
              row.style.display = 'table-row';
            } else {
              const rowStatus = row.dataset.status;
              row.style.display = rowStatus === filterValue ? 'table-row' : 'none';
            }
          });
        });
      }
    });
  </script>
